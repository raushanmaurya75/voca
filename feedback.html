<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Feedback - Voca AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .feedback-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .header p { color: var(--text-muted); font-size: 0.95rem; }

        .rating-group {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }

        .star {
            font-size: 2rem;
            cursor: pointer;
            color: #334155;
            transition: all 0.2s;
        }
        .star.active { color: #fbbf24; transform: scale(1.1); }
        .star:hover { transform: scale(1.2); }

        .input-group { margin-bottom: 1.5rem; }
        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        textarea {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus { border-color: var(--primary); }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status-msg {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.875rem;
            min-height: 1.25rem;
        }
        .status-msg.error { color: #ef4444; }
        .status-msg.success { color: #10b981; }

        #success-view { display: none; text-align: center; padding: 2rem 0; }
        #success-view h2 { color: #10b981; margin-bottom: 1rem; }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="feedback-card">
        <div id="form-view">
            <div class="header">
                <h1>We'd love your help!</h1>
                <p>How would you rate your experience with Voca AI so far?</p>
            </div>

            <div class="rating-group" id="rating-stars">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>

            <div class="input-group">
                <label>Tell us more (Optional)</label>
                <textarea id="comment" placeholder="What do you like? What can we improve?"></textarea>
            </div>

            <button id="submit-feedback" class="btn-submit" disabled>Submit Feedback</button>
            <div id="status-msg" class="status-msg"></div>
        </div>

        <div id="success-view">
            <div style="font-size: 4rem; margin-bottom: 1.5rem;">🎉</div>
            <h2>Thank You!</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Your feedback helps us make Voca better for everyone.</p>
            <button class="btn-submit" onclick="window.close()">Close</button>
        </div>
    </div>

    <script src="feedback.js"></script>
</body>
</html>
